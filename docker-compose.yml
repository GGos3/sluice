services:
  sluice-server:
    build: .
    image: ghcr.io/ggos3/sluice:latest
    environment:
      SLUICE_MODE: server
    ports:
      - "8080:8080"
    volumes:
      - ./configs/config.yaml:/etc/sluice/config.yaml:ro
    restart: unless-stopped

  sluice-client:
    build: .
    image: ghcr.io/ggos3/sluice:latest
    environment:
      SLUICE_MODE: client
      SLUICE_PROXY_HOST: sluice-server
      SLUICE_PROXY_PORT: "8080"
    depends_on:
      - sluice-server
    command: ["curl", "-v", "https://example.com"]

  sluice-gateway:
    build: .
    image: ghcr.io/ggos3/sluice:latest
    environment:
      SLUICE_MODE: gateway
      SLUICE_PROXY_HOST: 192.168.1.100  # replace with actual proxy server IP
      SLUICE_PROXY_PORT: "8080"
      # SLUICE_PROXY_DOMAINS: "github.com,api.github.com,pypi.org"  # optional: selective domain routing
      # SLUICE_REDIRECT_PORTS: "http"                                # default: http (80,443)
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
