services:
  server:
    build:
      context: ../
      dockerfile: Dockerfile
      target: server
    image: sluice-e2e-server
    networks:
      net-server:
        ipv4_address: 172.23.0.10
    cap_add:
      - NET_ADMIN
    volumes:
      - ../e2e/.ssh:/e2e-ssh:ro
      - ../e2e/entrypoint-server.sh:/e2e/entrypoint-server.sh:ro
    entrypoint: ["/e2e/entrypoint-server.sh"]
    depends_on:
      - firewall
      - agent

  agent:
    build:
      context: ../
      dockerfile: e2e/Dockerfile.agent
    image: sluice-e2e-agent
    networks:
      net-agent:
        ipv4_address: 172.24.0.10
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ../e2e/.ssh:/e2e-ssh:ro
      - ../e2e/entrypoint-agent.sh:/e2e/entrypoint-agent.sh:ro
    entrypoint: ["/e2e/entrypoint-agent.sh"]

  firewall:
    image: alpine:3.21
    networks:
      net-server:
        ipv4_address: 172.23.0.11
      net-agent:
        ipv4_address: 172.24.0.11
    privileged: true
    sysctls:
      - net.ipv4.ip_forward=1
    volumes:
      - ./entrypoint-firewall.sh:/entrypoint-firewall.sh:ro
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache iptables && exec /entrypoint-firewall.sh"]

networks:
  net-server:
    name: e2e-net-server
    ipam:
      config:
        - subnet: 172.23.0.0/24
  net-agent:
    name: e2e-net-agent
    ipam:
      config:
        - subnet: 172.24.0.0/24
