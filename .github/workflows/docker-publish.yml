name: Docker Publish

on:
  push:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -v -race -count=1 ./...

  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check E2E prerequisites
        id: prereq
        run: |
          echo "Checking /dev/net/tun..."
          ls -la /dev/net/tun && echo "tun=true" >> "$GITHUB_OUTPUT" || echo "tun=false" >> "$GITHUB_OUTPUT"
          echo "Checking kernel modules..."
          lsmod | grep nf_tables && echo "nft=true" >> "$GITHUB_OUTPUT" || echo "nft=false" >> "$GITHUB_OUTPUT"

      - name: Run E2E tests
        if: steps.prereq.outputs.tun == 'true'
        run: make e2e

      - name: Collect logs on failure
        if: failure()
        run: |
          mkdir -p e2e-artifacts
          docker compose -f e2e/docker-compose.yml logs > e2e-artifacts/compose.log 2>&1 || true
          docker compose -f e2e/docker-compose.yml ps > e2e-artifacts/compose-ps.log 2>&1 || true

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: e2e-artifacts/
          retention-days: 7

      - name: Skip notice
        if: steps.prereq.outputs.tun == 'false'
        run: echo "::warning::E2E tests skipped — /dev/net/tun not available on this runner"

  build-release:
    needs: test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross build
        run: make cross-build VERSION=${{ github.event.release.tag_name }}

      - name: Create checksums
        run: |
          cd bin
          sha256sum sluice-* > ../sluice-checksums.txt

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            bin/sluice-linux-amd64 \
            bin/sluice-linux-arm64 \
            bin/sluice-darwin-amd64 \
            bin/sluice-darwin-arm64 \
            sluice-checksums.txt \
            --clobber

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set build metadata
        id: meta_env
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for server
        id: meta_server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-server
          tags: |
            type=raw,value=dev,enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}},enable=${{ github.event_name == 'release' && !startsWith(github.event.release.tag_name, 'v0.') }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Docker metadata for agent
        id: meta_agent
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-agent
          tags: |
            type=raw,value=dev,enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}},enable=${{ github.event_name == 'release' && !startsWith(github.event.release.tag_name, 'v0.') }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_server.outputs.tags }}
          labels: ${{ steps.meta_server.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta_env.outputs.version }}
            BUILD_TIME=${{ steps.meta_env.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push agent
        uses: docker/build-push-action@v6
        with:
          context: .
          target: agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_agent.outputs.tags }}
          labels: ${{ steps.meta_agent.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta_env.outputs.version }}
            BUILD_TIME=${{ steps.meta_env.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
